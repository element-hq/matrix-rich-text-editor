name: Rust

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "main" ]

permissions: {}

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && format('rust-build-main-{0}', github.sha) || format('rust-build-pr-{0}', github.ref)  }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Install rust
      run: |
        rustup set profile minimal
        rustup show # installs from rust-toolchain.toml
    - name: Set Component 
      run: rustup component add rustfmt clippy
    - name: Format
      run: cargo fmt -- --check
    - name: Clippy
      run: cargo clippy --all-features -- -D warnings
    - name: Build
      run: cargo build --verbose
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@492cad282ff2bc751208d9bdcbbcce57c3a90925 # cargo-llvm-cov
    - name: Generate code coverage
      run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        files: lcov.info
        fail_ci_if_error: true
        flags: unittests-rust, unittests
        # https://github.com/codecov/codecov-action/issues/557#issuecomment-1216749652
        token: ${{ secrets.CODECOV_TOKEN }}
