<!DOCTYPE html>
<html lang="en" class="cpd-theme-light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Rich Text Editor</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                padding: 0;
                height: 100%;
            }

            body {
                background-color: var(--cpd-color-bg-canvas-default);
                color: var(--cpd-color-text-primary);
                font-family: var(--cpd-font-family-sans);
                font-size: var(--cpd-font-size-body-md);
            }

            #root {
                display: flex;
                flex-direction: column;
                height: 100%;
            }

            /* Debug panel: DOM tree inspector */
            .dom,
            .testCase {
                font-size: 13px;
                font-family: var(--cpd-font-family-mono, 'Courier New', monospace);
                background-color: rgba(0, 0, 0, 0.04);
                padding: 0.6em;
                border: 1px solid var(--cpd-color-border-interactive-secondary, #ccc);
                border-radius: 8px;
                overflow: auto;
            }
            .dom { line-height: 1.3; }
            .dom .quote { opacity: 0.3; }
            .dom ul { list-style: none; margin: 0 0 0 1.2em; padding: 0; }
            .dom > ul { margin: 0; }
            .dom ul.group_0 { border-left: 2px solid rgba(255,0,0,0.2); }
            .dom ul.group_1 { border-left: 2px solid rgba(0,0,255,0.2); }
            .dom ul.group_2 { border-left: 2px solid rgba(0,255,0,0.2); }
            .dom ul.group_3 { border-left: 2px solid rgba(255,200,0,0.3); }
            .dom ul.group_4 { border-left: 2px solid rgba(0,200,200,0.2); }
            .dom ul.group_5 { border-left: 2px solid rgba(255,0,255,0.2); }
            .dom ul.group_6 { border-left: 2px solid rgba(255,128,0,0.2); }
            .dom ul.group_7 { border-left: 2px solid rgba(0,128,255,0.2); }
            .dom ul.group_8 { border-left: 2px solid rgba(255,0,128,0.2); }
            .dom ul.group_9 { border-left: 2px solid rgba(128,0,255,0.2); }
            .dom input { opacity: 0; position: absolute; }
            .dom input ~ ul { display: none; }
            .dom label { user-select: text; }
            .dom input ~ label::before { content: '\229E'; margin-right: 0.2em; font-size: 120%; }
            .dom input:disabled:checked ~ label::before { opacity: 0; }
            .dom input:checked ~ ul { display: block; }
            .dom input:checked ~ label::before { content: '\229F'; }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
